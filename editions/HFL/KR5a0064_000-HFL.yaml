front:
  text: 玉清无上内景真經
  hash: sha256:698ffc3d1eb60d997c3e4a6dfe93a059033d1ca2ab20e6f522c6fda69366e125
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0064_HFL_000-001a, image: hfl/0032/0032-040.png}
body:
  text: 大羅真天元天大聖后紫光天母下傳爾時元始至真大聖化生開天以其大神通力大智慧力結造世界配合隂陽主張造化先於大梵真天玄空之中化諸外象以表内景而分九氣爲東方木精之色結化九氣丈人而君主之在人爲肝爲魂次分七氣爲西方金精之色結化七氣丈人而君主之在人爲肺爲魄次分三氣爲南方火精之色結化三氣丈人而君主之在人爲心爲神次分五氣爲北方坎精之色結化五氣丈人而君主之在人爲腎爲精四方餘氣水火金木分布中央爲黄庭之色結化一氣丈人而君主之在人爲脾爲思五臓含識共具十真十真之英能成九轉聚爲丹藥散爲甘露周旋上下煉養百骸沐濁留清消隂鑄陽復我太初保我大全出于崑崙入于太淵引其龍變經於虎城四氣和合成我至真衰殘易盛耄耋還嬰朽容再鮮白髮重青韻如鍾發身如羽輕盡更凡骨飛昇上清世之學士立戒持定而生智明以其三力永保億年履輕清之氣運定變化以超仙也左右二玄无極真宰以我此道廣布天人使其捨離无常之業而入真一之妙非老非死湛寂常存元始真尊於其七竅放大光明照无量土萬二千天百億人界各以自力散香雨華而爲貢奉莫不欣恱咸悟本心爾時玉清化宮於空玄中忽見寳月光明照映内外十虛寳月之中包含紫炁之内有一嬰兒坐寳華臺口放金光發大玉音而說偈曰一心生正定葛象自然陳逐方分五氣五氣孕一靈一靈通變化結煉本來真本真非有相非有亦非无兆能通此理方悟攝塵珠玄空之中月光之内玉嬰演教天上天下一時皆聞莫不慧海湛然業山摧毀反觀内照永契道真仰望聖光拜禮而去敬信奉持玉清无上内景真經
